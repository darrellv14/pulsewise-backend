          patientId: 3a233724-0b42-4a4f-88e8-88e732c46351
          firstName: Agus
          lastName: Pratama
          email: agus@example.com
          phone: '+628123456789'
          dateOfBirth: '1994-08-17'
          age: 31
          sex: male
        period:
          startAt: '2026-04-01T00:00:00.000Z'
          endAt: '2026-04-10T23:59:59.999Z'
          timePeriod: last_30_days
        stats:
          systolicBp:
            avg: 122.3
            min: 118
            max: 129
          diastolicBp:
            avg: 78.1
            min: 75
            max: 82
          heartRate:
            avg: 74
            min: 68
            max: 99
          oxygenSaturation:
            avg: 97.6
            min: 93
            max: 99
          weight:
            avg: 68.3
            min: 68.2
            max: 68.4
          bmi:
            avg: 22.9
            min: 22.8
            max: 23
        abnormalInstances:
          - timestamp: '2026-04-10T07:30:00.000Z'
            details:
              bloodPressure: 142/92 mmHg (Stage 2 Hypertension)
              oxygenSaturation: 93% (Caution)
        thresholds:
          SPO2_CRITICAL_THRESHOLD: 90
          SPO2_CAUTION_THRESHOLD: 95
          WEIGHT_DAILY_INCREASE_CRITICAL_KG: 2
          HR_NORMAL_MIN: 60
          HR_NORMAL_MAX: 100
          BP_NORMAL_SYSTOLIC_MAX: 119
          BP_NORMAL_DIASTOLIC_MAX: 79
          BP_ELEVATED_SYSTOLIC_MIN: 120
          BP_ELEVATED_SYSTOLIC_MAX: 129
          BP_ELEVATED_DIASTOLIC_MAX: 79
          BP_STAGE1_SYSTOLIC_MIN: 130
          BP_STAGE1_SYSTOLIC_MAX: 139
          BP_STAGE1_DIASTOLIC_MIN: 80
          BP_STAGE1_DIASTOLIC_MAX: 89
          BP_STAGE2_SYSTOLIC_MIN: 140
          BP_STAGE2_DIASTOLIC_MIN: 90

    BiometricsReadingInput:
      type: object
      required: [metricType, measuredAt]
      properties:
        metricType:
          type: string
          description: >
            Jenis metric biometrik. Backend menerima alias seperti
            `heart_rate`, `heartrate`, `hr`, `pulse`,
            `oxygen_saturation`, `oxygen`, `spo2`, `sp02`,
            `systolic`, `systolic_bp`, `systolic_pressure`,
            `diastolic`, `diastolic_bp`, `diastolic_pressure`,
            `weight`, `body_weight`, `height`, `body_height`, `bmi`,
            `total_cholesterol`, `urine_flow_rate`, `urination_time`,
            `urine_volume`, dan `pulse_regularity_code`.
            Nilai akan dinormalisasi ke canonical metric internal backend.
          example: spo2
        valueNumeric:
          type: number
          nullable: true
          example: 97
        unit:
          type: string
          nullable: true
          example: '%'
        measuredAt:
          type: string
          format: date-time
        payload:
          type: object
          nullable: true
          additionalProperties: true
          example:
            deviceModel: Pixel Watch 3
            deviceManufacturer: Google
            origin: health_connect

    BiometricsIngestRequest:
      type: object
      required: [source, readings]
      properties:
        patientId:
          type: string
          format: uuid
          nullable: true
          description: Wajib jika actor bukan pasien
        source:
          type: string
          description: Sumber data biometrik, misalnya `health_connect`, `manual`, `smartwatch`, atau nama connector internal lain.
          example: health_connect
        readings:
          type: array
          minItems: 1
          maxItems: 500
          items:
            $ref: '#/components/schemas/BiometricsReadingInput'
      example:
        source: health_connect
        readings:
          - metricType: heart_rate
            valueNumeric: 78
            unit: bpm
            measuredAt: '2026-05-04T08:00:00.000Z'
          - metricType: spo2
            valueNumeric: 97
            unit: '%'
            measuredAt: '2026-05-04T08:00:00.000Z'
            payload:
              deviceModel: Pixel Watch 3
              origin: health_connect

    BiometricsIngestItem:
      type: object
      properties:
        readingId:
          type: integer
        metricType:
          type: string
        measuredAt:
          type: string
          format: date-time
        valueNumeric:
          type: number
          nullable: true
        unit:
          type: string
          nullable: true
        duplicate:
          type: boolean
      example:
        readingId: 1204
        metricType: oxygen_saturation
        measuredAt: '2026-05-04T08:00:00.000Z'
        valueNumeric: 97
        unit: '%'
        duplicate: false

    BiometricsIngestData:
      type: object
      properties:
        patientId:
          type: string
          format: uuid
        source:
          type: string
        totalReceived:
          type: integer
        insertedCount:
          type: integer
        duplicateCount:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/BiometricsIngestItem'
      example:
        patientId: 3a233724-0b42-4a4f-88e8-88e732c46351
        source: health_connect
        totalReceived: 2
        insertedCount: 2
        duplicateCount: 0
        items:
          - readingId: 1204
            metricType: heart_rate
            measuredAt: '2026-05-04T08:00:00.000Z'
            valueNumeric: 78
            unit: bpm
            duplicate: false
          - readingId: 1205
            metricType: oxygen_saturation
            measuredAt: '2026-05-04T08:00:00.000Z'
            valueNumeric: 97
            unit: '%'
            duplicate: false

    BiometricsHistoryFilters:
      type: object
      properties:
        source:
          type: string
          nullable: true
        metricType:
          type: string
          nullable: true
          description: >
            Query menerima alias seperti `spo2`, `oxygen`, atau
            `oxygen_saturation`. Backend akan mengembalikan nilai metric
            canonical yang sudah dinormalisasi.
        startAt:
          type: string
          format: date-time
          nullable: true
        endAt:
          type: string
          format: date-time
          nullable: true
      example:
        source: health_connect
        metricType: oxygen_saturation
        startAt: '2026-05-01T00:00:00.000Z'
        endAt: '2026-05-04T23:59:59.999Z'

    BiometricsHistoryItem:
      type: object
      properties:
        readingId:
          type: integer
        source:
          type: string
        metricType:
          type: string
        valueNumeric:
          type: number
          nullable: true
        unit:
          type: string
          nullable: true
        payload:
          type: object
          nullable: true
          additionalProperties: true
        measuredAt:
          type: string
          format: date-time
        receivedAt:
          type: string
          format: date-time
      example:
        readingId: 1204
        source: health_connect
        metricType: oxygen_saturation
        valueNumeric: 97
        unit: '%'
        payload:
          deviceModel: Pixel Watch 3
          origin: health_connect
        measuredAt: '2026-05-04T08:00:00.000Z'
        receivedAt: '2026-05-04T08:00:05.000Z'

    BiometricsHistoryData:
      type: object
      properties:
        patientId:
          type: string
          format: uuid
        filters:
          $ref: '#/components/schemas/BiometricsHistoryFilters'
        items:
          type: array
          items:
            $ref: '#/components/schemas/BiometricsHistoryItem'
        pagination:
          $ref: '#/components/schemas/Pagination'
      example:
        patientId: 3a233724-0b42-4a4f-88e8-88e732c46351
        filters:
          source: health_connect
          metricType: oxygen_saturation
          startAt: '2026-05-01T00:00:00.000Z'
          endAt: '2026-05-04T23:59:59.999Z'
        items:
          - readingId: 1204
            source: health_connect
            metricType: oxygen_saturation
            valueNumeric: 97
            unit: '%'
            payload:
              deviceModel: Pixel Watch 3
              origin: health_connect
            measuredAt: '2026-05-04T08:00:00.000Z'
            receivedAt: '2026-05-04T08:00:05.000Z'
        pagination:
          page: 1
          limit: 20
          totalItems: 1
          totalPages: 1

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check service, DB, Redis, dan cache metrics
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          timestamp:
                            type: string
                            format: date-time
                          dbTime:
                            type: string
                            format: date-time
                          redis:
                            type: object
                            properties:
                              enabled:
                                type: boolean
                              available:
                                type: boolean
                              backend:
                                type: string
                                nullable: true
                              lastConnectedAt:
                                type: string
                                format: date-time
                                nullable: true
                              lastError:
                                type: string
                                nullable: true
                          cache:
                            type: object
                            properties:
                              hits:
                                type: integer
                              misses:
                                type: integer
                              requests:
                                type: integer
                              hitRate:
                                type: number
                                nullable: true
                              sets:
                                type: integer
                              invalidationsExact:
                                type: integer
                              invalidationsPrefix:
                                type: integer
                              lastOperationAt:
                                type: string
                                format: date-time
                                nullable: true
                              backends:
                                type: object
                                properties:
                                  redis:
                                    type: integer
                                  memory:
                                    type: integer
                              windows:
                                type: object
                                properties:
                                  hitRate:
                                    type: number
                                    nullable: true
                                  last60Minutes:
                                    type: array
                                    items:
                                      type: object
                                      properties:
                                        minute:
                                          type: string
                                          format: date-time
                                        hits:
                                          type: integer
                                        misses:
                                          type: integer
                                        requests:
                                          type: integer
                                        hitRate:
                                          type: number
                                          nullable: true
                                        sets:
                                          type: integer
                                        invalidationsExact:
                                          type: integer
                                        invalidationsPrefix:
                                          type: integer
  /metrics:
    get:
      tags: [Health]
      summary: Export metrics Prometheus text format
      description: |
        Endpoint ini ditujukan untuk observability/monitoring dan dikunci oleh token metrics.
        Kirim `x-metrics-token` atau `Authorization: Bearer <token>` sesuai `METRICS_TOKEN`.
      responses:
        '200':
          description: Metrics text payload
          content:
            text/plain:
              schema:
                type: string
                example: |
                  # HELP pulsewise_cache_hits_total Total cache hits.
                  # TYPE pulsewise_cache_hits_total counter
                  pulsewise_cache_hits_total 42
        '401':
          description: Missing or invalid metrics token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Metrics endpoint disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /auth/register:
    post:
      tags: [Auth]
      summary: Register user baru (status pending_verification)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Register success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: '#/components/schemas/AuthUser'
                          nextStep:
                            type: string
                            example: EMAIL_VERIFICATION_REQUIRED
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Duplicate username/email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login dengan email dan password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          token:
                            type: string
                          user:
                            $ref: '#/components/schemas/AuthUser'
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Account not active
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /auth/verifications/email:
    post:
      tags: [Auth]
      summary: Kirim OTP verifikasi email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationRequest'
      responses:
        '200':
          description: OTP sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /auth/verifications/email/confirm:
    post:
      tags: [Auth]
      summary: Konfirmasi OTP verifikasi email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationConfirmRequest'
      responses:
        '200':
          description: Email verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: Invalid or expired OTP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /auth/oauth/google:
    post:
      tags: [Auth]
      summary: Cek status akun Google dan tentukan next step onboarding/login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoogleOauthRequest'
      responses:
        '200':
          description: OAuth Google berhasil diverifikasi
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/GoogleOauthBeginData'
        '401':
          description: Invalid Google token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Email sudah terhubung ke akun Google lain
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '501':
          description: OAuth provider not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /auth/oauth/google/register:
    post:
      tags: [Auth]
      summary: Selesaikan registrasi akun Google baru lalu kirim OTP email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoogleOauthRegisterRequest'
      responses:
        '200':
          description: Registrasi Google dilanjutkan ke verifikasi OTP
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/GoogleOauthBeginData'
        '401':
          description: Token registrasi Google tidak valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Akun Google sudah aktif atau bentrok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /auth/me:
    get:
      tags: [Auth]
      summary: Ambil profil user saat ini
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AuthUser'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Meminta pengiriman OTP ke email untuk reset password
      description: |
        Hanya berlaku untuk akun email/password (non-Google OAuth).
        Selalu merespons 200 untuk mencegah enumerasi email.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: OTP berhasil dikirim (atau disimulasikan sukses)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          delivery:
                            type: string
                          expiresInMinutes:
                            type: integer
                          nextStep:
                            type: string
        '400':
          description: Payload tidak valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /auth/forgot-password/verify:
    post:
      tags: [Auth]
      summary: Verifikasi OTP reset password
      description: |
        Memverifikasi OTP dan mengembalikan `resetToken` (JWT) jika valid.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordVerifyRequest'
      responses:
        '200':
          description: OTP valid
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          nextStep:
                            type: string
                          resetToken:
                            type: string
        '400':
          description: OTP tidak valid atau kedaluwarsa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Akun Google OAuth tidak didukung
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /auth/forgot-password/reset:
    post:
      tags: [Auth]
      summary: Reset password menggunakan resetToken
      description: |
        Mengubah password akun menggunakan token dari tahap verifikasi.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordResetRequest'
      responses:
        '200':
          description: Password berhasil direset
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          nextStep:
                            type: string
        '400':
          description: Validasi gagal atau password sama dengan password lama
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token reset password tidak valid atau kedaluwarsa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Akun Google OAuth tidak didukung
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /auth/change-password:
    post:
      tags: [Auth]
      summary: Ubah password akun email/password
      description: >
        Hanya tersedia untuk akun yang menggunakan login email/password.
        Akun Google OAuth akan ditolak oleh endpoint ini.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password berhasil diperbarui
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          nextStep:
                            type: string
                            example: LOGIN_AGAIN
        '400':
          description: Payload tidak valid atau password baru sama dengan password saat ini
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Password saat ini salah atau token tidak valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Endpoint tidak berlaku untuk akun Google OAuth
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /patients:
    get:
      tags: [Patients]
      summary: List patients (Phase 2 target)
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/Order'
      responses:
        '200':
          description: List patients
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/PatientProfile'
                          pagination:
                            $ref: '#/components/schemas/Pagination'

  /patients/{patientId}/profile:
    get:
      tags: [Patients]
      summary: Detail patient profile (Phase 2 target)
      security:
        - BearerAuth: []
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Patient profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PatientProfile'
    put:
      tags: [Patients]
      summary: Update patient profile (Phase 2 target)
      description: >
        Untuk onboarding patient, FE bisa tetap memakai satu flow UI. Setelah register/login
        berhasil, kirim biodata ke endpoint ini sebagai proses kedua. Payload memakai field
        English yang canonical: `dateOfBirth`, `sex`, `heightCm`, `bloodType`, dan `address`.
      security:
        - BearerAuth: []
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatientProfileUpdateRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PatientProfile'

  /doctors/{doctorId}/profile:
    get:
      tags: [Doctors]
      summary: Detail doctor profile (Phase 2 target)
      security:
        - BearerAuth: []
      parameters:
        - name: doctorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Doctor profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DoctorProfile'
    put:
      tags: [Doctors]
      summary: Update doctor profile (Phase 2 target)
      security:
        - BearerAuth: []
      parameters:
        - name: doctorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
