openapi: 3.0.3
info:
  title: PulseWise Backend API
  version: 2.0.0
  description: |
    Kontrak API utama PulseWise.
    Semua endpoint menggunakan JSON dan response envelope standar.
    Path canonical saat ini tidak lagi memakai prefix `/api/v1`.
servers:
  - url: https://api.darrellvalentino.com
    description: Production
  - url: http://localhost:5000
    description: Local Development

tags:
  - name: Health
  - name: Auth
  - name: Patients
  - name: Doctors
  - name: DoctorPatients
  - name: DoctorDashboard
  - name: Medications
  - name: Patient Care
  - name: Profile Management
  - name: Biometrics

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    FromDate:
      name: from
      in: query
      required: true
      schema:
        type: string
        format: date
        example: '2026-04-01'
    ToDate:
      name: to
      in: query
      required: true
      schema:
        type: string
        format: date
        example: '2026-04-30'
    SortBy:
      name: sortBy
      in: query
      schema:
        type: string
        example: created_at
    Order:
      name: order
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: desc

  schemas:
    SuccessEnvelope:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Operation success
        data:
          type: object
          nullable: true

    ErrorEnvelope:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Validation failed
        details:
          type: object
          nullable: true
          additionalProperties: true

    Pagination:
      type: object
      required: [page, limit, totalItems, totalPages]
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        totalItems:
          type: integer
          example: 125
        totalPages:
          type: integer
          example: 7

    AuthUser:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        avatarPhoto:
          type: string
          format: uri
          nullable: true
        role:
          type: string
          enum: [patient, doctor, admin]
        accountStatus:
          type: string
          enum: [pending_verification, active, suspended]
        emailVerifiedAt:
          type: string
          format: date-time
          nullable: true
        onboardingCompleted:
          type: boolean
      example:
        userId: 3a233724-0b42-4a4f-88e8-88e732c46351
        username: agus
        email: agus@example.com
        firstName: Agus
        lastName: Pratama
        avatarPhoto: https://res.cloudinary.com/drvu0dpry/image/upload/v1776071700/pulsewise/avatars/profile.png
        role: patient
        accountStatus: active
        emailVerifiedAt: '2026-04-10T08:15:00.000Z'
        onboardingCompleted: true

    RegisterRequest:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          minLength: 3
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          enum: [patient, doctor, admin]
          default: patient

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword, confirmNewPassword]
      properties:
        currentPassword:
          type: string
          minLength: 1
          maxLength: 128
        newPassword:
          type: string
          minLength: 8
          maxLength: 128
        confirmNewPassword:
          type: string
          minLength: 8
          maxLength: 128
      example:
        currentPassword: old-password
        newPassword: new-password-123
        confirmNewPassword: new-password-123

    EmailVerificationRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ForgotPasswordVerifyRequest:
      type: object
      required: [email, otp]
      properties:
        email:
          type: string
          format: email
        otp:
          type: string
          example: '123456'

    ForgotPasswordResetRequest:
      type: object
      required: [resetToken, newPassword, confirmNewPassword]
      properties:
        resetToken:
          type: string
        newPassword:
          type: string
          minLength: 8
          maxLength: 128
        confirmNewPassword:
          type: string
          minLength: 8
          maxLength: 128

    EmailVerificationConfirmRequest:
      type: object
      required: [email, otp]
      properties:
        email:
          type: string
          format: email
        otp:
          type: string
          example: '123456'

    GoogleOauthRequest:
      type: object
      required: [idToken]
      properties:
        idToken:
          type: string
        role:
          type: string
          enum: [patient, doctor]
          default: patient

    GoogleOauthRegisterRequest:
      type: object
      required: [registrationToken, username]
      properties:
        registrationToken:
          type: string
        username:
          type: string
          minLength: 3
          maxLength: 100
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        role:
          type: string
          enum: [patient, doctor]
          default: patient

    GoogleProfilePreview:
      type: object
      properties:
        email:
          type: string
          format: email
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        avatarPhoto:
          type: string
          format: uri
          nullable: true

    GoogleOauthBeginData:
      type: object
      properties:
        nextStep:
          type: string
          enum: [HOME, COMPLETE_REGISTRATION, VERIFY_OTP]
        accountExists:
          type: boolean
        registrationCompleted:
          type: boolean
        otpRequired:
          type: boolean
        registrationToken:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        token:
          type: string
          nullable: true
        user:
          $ref: '#/components/schemas/AuthUser'
        googleProfile:
          $ref: '#/components/schemas/GoogleProfilePreview'

    PatientProfile:
      type: object
      properties:
        patient_id:
          type: string
          format: uuid
        date_of_birth:
          type: string
          format: date
          nullable: true
        sex:
          type: string
          nullable: true
        body_height_cm:
          type: number
          nullable: true
          example: 172.5
        is_smoking:
          type: boolean
          nullable: true
          example: false
        is_electric_smoking:
          type: boolean
          nullable: true
          example: false
        blood_type:
          type: string
          nullable: true
          enum: [A, A+, A-, B, B+, B-, AB, AB+, AB-, O, O+, O-]
        address:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        avatar_photo:
          type: string
          format: uri
          nullable: true
      example:
        patient_id: 3a233724-0b42-4a4f-88e8-88e732c46351
        date_of_birth: '1994-08-17'
        sex: male
        body_height_cm: 172.5
        is_smoking: false
        is_electric_smoking: false
        blood_type: O+
        address: Jalan Sukamaju No. 88, Surabaya
        created_at: '2026-04-10T08:15:00.000Z'
        first_name: Agus
        last_name: Pratama
        email: agus@example.com
        avatar_photo: https://res.cloudinary.com/drvu0dpry/image/upload/v1776071700/pulsewise/avatars/profile.png

    DoctorProfile:
      type: object
      properties:
        doctor_id:
          type: string
          format: uuid
        specialization:
          type: string
          nullable: true
        license_no:
          type: string
          nullable: true
        hospital_name:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        avatar_photo:
          type: string
          format: uri
          nullable: true
      example:
        doctor_id: 8aca6089-3899-4b85-a715-0a63113e846a
        specialization: Cardiology
        license_no: DOC-123456
        hospital_name: RS PulseWise
        created_at: '2026-04-10T08:15:00.000Z'
        first_name: Intan
        last_name: Wijaya
        email: intan.wijaya@example.com
        avatar_photo: https://res.cloudinary.com/drvu0dpry/image/upload/v1776071700/pulsewise/avatars/profile.png

    PatientProfileUpdateRequest:
      type: object
      minProperties: 1
      description: >
        Dipakai sebagai proses kedua setelah register/login berhasil pada flow onboarding patient.
        Gunakan field English yang canonical agar kontrak FE dan BE tetap sederhana.
      properties:
        dateOfBirth:
          type: string
          format: date
          nullable: true
        heightCm:
          type: number
          minimum: 30
          maximum: 300
          nullable: true
        isSmoking:
          type: boolean
          nullable: true
        isElectricSmoking:
          type: boolean
          nullable: true
        bloodType:
          type: string
          nullable: true
          enum: [A, A+, A-, B, B+, B-, AB, AB+, AB-, O, O+, O-]
        sex:
          type: string
          nullable: true
          example: male
        address:
          type: string
          nullable: true
          example: Jalan Sukamaju No. 88, Surabaya

    Medication:
      type: object
      properties:
        medicationId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        conditionTag:
          type: string
          nullable: true
        form:
          type: string
          nullable: true
        color:
          type: string
          nullable: true
        singleDose:
          type: number
          nullable: true
        singleDoseUnit:
          type: string
          nullable: true
        startDate:
          type: string
          format: date
          nullable: true
        frequency:
          type: string
          enum: [daily, weekly]
        numOfDays:
          type: integer
          nullable: true
        daysOfWeek:
          type: array
          items:
            type: integer
            minimum: 1
            maximum: 7
        intakeTimes:
          type: array
          items:
            type: string
            pattern: '^([01]\\d|2[0-3]):([0-5]\\d)$'
        note:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        reminders:
          type: array
          items:
            $ref: '#/components/schemas/Reminder'
      example:
        medicationId: 1e0d4a7c-6fdf-4973-a2bd-7577514a966f
        userId: 3a233724-0b42-4a4f-88e8-88e732c46351
        name: Aspirin
        description: Obat harian untuk terapi jantung
        conditionTag: heart
        form: tablet
        color: '#22C55E'
        singleDose: 1
        singleDoseUnit: tablet
        startDate: '2026-04-10'
        frequency: daily
        numOfDays: 7
        daysOfWeek: []
        intakeTimes:
          - '08:00'
          - '20:00'
        note: Minum setelah makan
        createdAt: '2026-04-10T08:15:00.000Z'
        reminders:
          - reminderId: 9f7c5d8b-1234-4dcd-99c1-1234567890ab
            userId: 3a233724-0b42-4a4f-88e8-88e732c46351
            medicationId: 1e0d4a7c-6fdf-4973-a2bd-7577514a966f
            scheduleTime: '08:00'
            dayOfWeek: null
            createdAt: '2026-04-10T08:15:00.000Z'

    MedicationCalendarEvent:
      type: object
      properties:
        eventId:
          type: string
          example: rem-123:2026-04-11
        scheduledDate:
          type: string
          format: date
        scheduledTime:
          type: string
          example: '08:00'
        reminderId:
          type: string
          format: uuid
        medicationId:
          type: string
          format: uuid
        medicationLogId:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
        color:
          type: string
          nullable: true
        singleDose:
          type: number
          nullable: true
        singleDoseUnit:
          type: string
          nullable: true
        status:
          type: string
          nullable: true
          enum: [taken, skipped, missed]
      example:
        eventId: 9f7c5d8b-1234-4dcd-99c1-1234567890ab:2026-04-11
        scheduledDate: '2026-04-11'
        scheduledTime: '08:00'
        reminderId: 9f7c5d8b-1234-4dcd-99c1-1234567890ab
        medicationId: 1e0d4a7c-6fdf-4973-a2bd-7577514a966f
        medicationLogId: 3f26d26f-f29a-42a7-b4d1-59880b1d6f02
        name: Aspirin
        color: '#22C55E'
        singleDose: 1
        singleDoseUnit: tablet
        status: taken

    MedicationCalendarData:
      type: object
      properties:
        range:
          type: object
          properties:
            from:
              type: string
              format: date
            to:
              type: string
              format: date
        totalItems:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/MedicationCalendarEvent'
      example:
        range:
          from: '2026-04-10'
          to: '2026-04-13'
        totalItems: 4
        items:
          - eventId: 9f7c5d8b-1234-4dcd-99c1-1234567890ab:2026-04-10
            scheduledDate: '2026-04-10'
            scheduledTime: '08:00'
            reminderId: 9f7c5d8b-1234-4dcd-99c1-1234567890ab
            medicationId: 1e0d4a7c-6fdf-4973-a2bd-7577514a966f
            medicationLogId: null
            name: Aspirin
            color: '#22C55E'
            singleDose: 1
            singleDoseUnit: tablet
            status: null
          - eventId: 9f7c5d8b-1234-4dcd-99c1-1234567890ab:2026-04-11
            scheduledDate: '2026-04-11'
            scheduledTime: '08:00'
            reminderId: 9f7c5d8b-1234-4dcd-99c1-1234567890ab
            medicationId: 1e0d4a7c-6fdf-4973-a2bd-7577514a966f
            medicationLogId: 3f26d26f-f29a-42a7-b4d1-59880b1d6f02
            name: Aspirin
            color: '#22C55E'
            singleDose: 1
            singleDoseUnit: tablet
            status: taken
          - eventId: 9f7c5d8b-1234-4dcd-99c1-1234567890ab:2026-04-12
            scheduledDate: '2026-04-12'
            scheduledTime: '08:00'
            reminderId: 9f7c5d8b-1234-4dcd-99c1-1234567890ab
            medicationId: 1e0d4a7c-6fdf-4973-a2bd-7577514a966f
            medicationLogId: null
            name: Aspirin
            color: '#22C55E'
            singleDose: 1
            singleDoseUnit: tablet
            status: null
          - eventId: 2f7c5d8b-1234-4dcd-99c1-1234567890ac:2026-04-13
            scheduledDate: '2026-04-13'
            scheduledTime: '09:30'
            reminderId: 2f7c5d8b-1234-4dcd-99c1-1234567890ac
            medicationId: 2e0d4a7c-6fdf-4973-a2bd-7577514a966f
            medicationLogId: null
            name: Vitamin C
            color: orange
            singleDose: 2
            singleDoseUnit: capsule
            status: null

    Reminder:
      type: object
      properties:
        reminderId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        medicationId:
          type: string
          format: uuid
        scheduleTime:
          type: string
          example: '08:00'
        dayOfWeek:
          type: integer
          nullable: true
          minimum: 1
          maximum: 7
        createdAt:
          type: string
          format: date-time
      example:
        reminderId: 9f7c5d8b-1234-4dcd-99c1-1234567890ab
        userId: 3a233724-0b42-4a4f-88e8-88e732c46351
        medicationId: 1e0d4a7c-6fdf-4973-a2bd-7577514a966f
        scheduleTime: '08:00'
        dayOfWeek: null
        createdAt: '2026-04-10T08:15:00.000Z'

    ReminderInput:
      type: object
      required: [scheduleTime]
      properties:
        scheduleTime:
          type: string
          pattern: '^([01]\\d|2[0-3]):([0-5]\\d)$'
          example: '08:00'
        dayOfWeek:
          type: integer
          nullable: true
          minimum: 1
          maximum: 7

    MedicationLog:
      type: object
      properties:
        medicationLogId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        medicationId:
          type: string
          format: uuid
        status:
          type: string
          enum: [taken, skipped, missed]
          default: taken
        medicationDate:
          type: string
          format: date
        medicationTime:
          type: string
          nullable: true
          example: '08:15'
        createdAt:
          type: string
          format: date-time
      example:
        medicationLogId: 3f26d26f-f29a-42a7-b4d1-59880b1d6f02
        userId: 3a233724-0b42-4a4f-88e8-88e732c46351
        medicationId: 1e0d4a7c-6fdf-4973-a2bd-7577514a966f
        status: taken
        medicationDate: '2026-04-10'
        medicationTime: '08:15'
        createdAt: '2026-04-10T08:15:00.000Z'

    MedicationLogCreateRequest:
      type: object
      required: [medicationDate]
      properties:
        medicationDate:
          type: string
          format: date
          example: '2026-04-10'
        medicationTime:
          type: string
          nullable: true
          pattern: '^([01]\\d|2[0-3]):([0-5]\\d)$'
          example: '08:15'
        status:
          type: string
          enum: [taken, skipped, missed]
          default: taken
          example: taken

    EmergencyContact:
      type: object
      properties:
        emergencyContactId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        contactLabel:
          type: string
        contactNumber:
          type: string
        isPriority:
          type: boolean
        createdAt:
          type: string
          format: date-time
      example:
        emergencyContactId: 1a3b5c7d-9e0f-4a11-8b22-334455667788
        userId: 3a233724-0b42-4a4f-88e8-88e732c46351
        contactLabel: Ibu
        contactNumber: '+628123456789'
        isPriority: true
        createdAt: '2026-04-10T08:15:00.000Z'

    EmergencyContactCreateRequest:
      type: object
      required: [contactLabel, contactNumber]
      properties:
        contactLabel:
          type: string
          minLength: 1
          maxLength: 100
        contactNumber:
          type: string
          minLength: 3
          maxLength: 50
        isPriority:
          type: boolean
          default: false

    EmergencyContactUpdateRequest:
      type: object
      minProperties: 1
      properties:
        contactLabel:
          type: string
          nullable: true
          maxLength: 100
        contactNumber:
          type: string
          nullable: true
          maxLength: 50
        isPriority:
          type: boolean

    HeartDiary:
      type: object
      properties:
        diaryId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        diaryDate:
          type: string
          format: date
        createdAt:
          type: string
          format: date-time
      example:
        diaryId: 5e5f09ab-5543-435d-b0fb-9a8ef041d8b0
        userId: 3a233724-0b42-4a4f-88e8-88e732c46351
        diaryDate: '2026-04-10'
        createdAt: '2026-04-10T08:15:00.000Z'

    DailyBodyMetric:
      type: object
      properties:
        metricId:
          type: string
          format: uuid
        diaryId:
          type: string
          format: uuid
        conditionTag:
          type: string
          nullable: true
        bodyHeight:
          type: number
          nullable: true
        bodyWeight:
          type: number
          nullable: true
        bmi:
          type: number
          nullable: true
        systolicPressure:
          type: integer
          nullable: true
        diastolicPressure:
          type: integer
          nullable: true
        heartRate:
          type: integer
          nullable: true
        latestHeartRate:
          type: integer
          nullable: true
        latestHeartRateMeasuredAt:
          type: string
          format: date-time
          nullable: true
        latestOxygenSaturation:
          type: integer
          nullable: true
        latestOxygenSaturationMeasuredAt:
          type: string
          format: date-time
          nullable: true
        timeStamp:
          type: string
          format: date-time
          nullable: true
      example:
        metricId: 7b5d8f10-1111-4222-8333-1234567890ab
        diaryId: 5e5f09ab-5543-435d-b0fb-9a8ef041d8b0
        conditionTag: after_breakfast
        bodyHeight: 172.5
        bodyWeight: 68.2
        bmi: 22.9
        systolicPressure: 122
        diastolicPressure: 78
        heartRate: 74
        latestHeartRate: 81
        latestHeartRateMeasuredAt: '2026-05-04T08:30:00.000Z'
        latestOxygenSaturation: 98
        latestOxygenSaturationMeasuredAt: '2026-05-04T08:31:00.000Z'
        timeStamp: '2026-04-10T07:30:00.000Z'

    DailySymptom:
      type: object
      properties:
        symptomId:
          type: string
          format: uuid
        diaryId:
          type: string
          format: uuid
        symptomName:
          type: string
        symptomCode:
          type: string
          nullable: true
          enum:
            [
              chest_pain,
              shortness_of_breath,
              palpitations,
              dizziness,
              headache,
              fatigue,
              cough,
              swelling,
              nausea,
              other,
            ]
        bodyArea:
          type: string
          nullable: true
          enum: [head, chest, neck, left_arm, right_arm, upper_abdomen, back, leg, general, other]
        isChestPain:
          type: boolean
          nullable: true
        painFrequencyCode:
          type: integer
          nullable: true
          enum: [0, 1, 2]
          description: 0 = unknown, 1 = less than 30 minutes, 2 = 30 minutes or more
        painLocationCode:
          type: integer
          nullable: true
          enum: [0, 1, 2, 3, 4, 5, 6, 7, 8]
