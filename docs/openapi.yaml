            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DailyConsumption'

  /api/v1/users/{userId}/avatar/upload-signature:
    get:
      tags: [Profile Management]
      summary: Generate secure avatar upload signature
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: folder
          in: query
          required: false
          schema:
            type: string
            maxLength: 120
      responses:
        '200':
          description: Signature upload berhasil dibuat
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AvatarUploadSignatureResponse'

  /api/v1/users/{userId}/avatar:
    put:
      tags: [Profile Management]
      summary: Save patient avatar after upload
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AvatarSaveRequest'
      responses:
        '200':
          description: Avatar user berhasil diperbarui
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AvatarSaveResponse'

  /api/v1/biometrics:
    post:
      tags: [Biometrics]
      summary: Ingest data biometrik time-series
      description: |
        Endpoint ingest utama untuk data biometrik dari mobile/connector.
        Menggunakan duplicate check agar ingestion idempotent.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BiometricsIngestRequest'
      responses:
        '201':
          description: Ingest berhasil diproses
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/BiometricsIngestData'
        '400':
          description: Payload tidak valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    get:
      tags: [Biometrics]
      summary: Ambil histori biometrik pasien
      description: Alias route juga tersedia di `/api/biometrics`.
      security:
        - BearerAuth: []
      parameters:
        - name: patientId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: source
          in: query
          required: false
          schema:
            type: string
        - name: metricType
          in: query
          required: false
          schema:
            type: string
            example: systolic_bp
        - name: startAt
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: endAt
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: Histori biometrik
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/BiometricsHistoryData'
        '400':
          description: Query tidak valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
