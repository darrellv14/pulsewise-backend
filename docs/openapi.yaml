    BiometricsReadingInput:
      type: object
      required: [metricType, measuredAt]
      properties:
        metricType:
          type: string
          example: systolic_bp
        valueNumeric:
          type: number
          nullable: true
          example: 128
        unit:
          type: string
          nullable: true
          example: mmHg
        measuredAt:
          type: string
          format: date-time
        payload:
          type: object
          nullable: true
          additionalProperties: true

    BiometricsIngestRequest:
      type: object
      required: [source, readings]
      properties:
        patientId:
          type: string
          format: uuid
          nullable: true
          description: Wajib jika actor bukan pasien
        source:
          type: string
          example: health_connect
        readings:
          type: array
          minItems: 1
          maxItems: 500
          items:
            $ref: '#/components/schemas/BiometricsReadingInput'

    BiometricsIngestItem:
      type: object
      properties:
        readingId:
          type: integer
        metricType:
          type: string
        measuredAt:
          type: string
          format: date-time
        valueNumeric:
          type: number
          nullable: true
        unit:
          type: string
          nullable: true
        duplicate:
          type: boolean
      example:
        readingId: 1204
        metricType: systolic_bp
        measuredAt: '2026-04-10T07:30:00.000Z'
        valueNumeric: 128
        unit: mmHg
        duplicate: false

    BiometricsIngestData:
      type: object
      properties:
        patientId:
          type: string
          format: uuid
        source:
          type: string
        totalReceived:
          type: integer
        insertedCount:
          type: integer
        duplicateCount:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/BiometricsIngestItem'
      example:
        patientId: 3a233724-0b42-4a4f-88e8-88e732c46351
        source: health_connect
        totalReceived: 2
        insertedCount: 1
        duplicateCount: 1
        items:
          - readingId: 1204
            metricType: systolic_bp
            measuredAt: '2026-04-10T07:30:00.000Z'
            valueNumeric: 128
            unit: mmHg
            duplicate: false
          - readingId: 1203
            metricType: systolic_bp
            measuredAt: '2026-04-10T07:25:00.000Z'
            valueNumeric: 128
            unit: mmHg
            duplicate: true

    BiometricsHistoryFilters:
      type: object
      properties:
        source:
          type: string
          nullable: true
        metricType:
          type: string
          nullable: true
        startAt:
          type: string
          format: date-time
          nullable: true
        endAt:
          type: string
          format: date-time
          nullable: true
      example:
        source: health_connect
        metricType: systolic_bp
        startAt: '2026-04-01T00:00:00.000Z'
        endAt: '2026-04-10T23:59:59.999Z'

    BiometricsHistoryItem:
      type: object
      properties:
        readingId:
          type: integer
        source:
          type: string
        metricType:
          type: string
        valueNumeric:
          type: number
          nullable: true
        unit:
          type: string
          nullable: true
        payload:
          type: object
          nullable: true
          additionalProperties: true
        measuredAt:
          type: string
          format: date-time
        receivedAt:
          type: string
          format: date-time
      example:
        readingId: 1204
        source: health_connect
        metricType: systolic_bp
        valueNumeric: 128
        unit: mmHg
        payload:
          deviceModel: Pixel Watch 3
        measuredAt: '2026-04-10T07:30:00.000Z'
        receivedAt: '2026-04-10T07:30:05.000Z'

    BiometricsHistoryData:
      type: object
      properties:
        patientId:
          type: string
          format: uuid
        filters:
          $ref: '#/components/schemas/BiometricsHistoryFilters'
        items:
          type: array
          items:
            $ref: '#/components/schemas/BiometricsHistoryItem'
        pagination:
          $ref: '#/components/schemas/Pagination'
      example:
        patientId: 3a233724-0b42-4a4f-88e8-88e732c46351
        filters:
          source: health_connect
          metricType: systolic_bp
          startAt: '2026-04-01T00:00:00.000Z'
          endAt: '2026-04-10T23:59:59.999Z'
        items:
          - readingId: 1204
            source: health_connect
            metricType: systolic_bp
            valueNumeric: 128
            unit: mmHg
            payload:
              deviceModel: Pixel Watch 3
            measuredAt: '2026-04-10T07:30:00.000Z'
            receivedAt: '2026-04-10T07:30:05.000Z'
        pagination:
          page: 1
          limit: 20
          totalItems: 1
          totalPages: 1

paths:
  /api/v1/health:
    get:
      tags: [Health]
      summary: Health check service + DB
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          timestamp:
                            type: string
                            format: date-time
                          dbTime:
                            type: string
                            format: date-time

  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register user baru (status pending_verification)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Register success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: '#/components/schemas/AuthUser'
                          nextStep:
                            type: string
                            example: EMAIL_VERIFICATION_REQUIRED
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Duplicate username/email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login dengan email dan password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          token:
                            type: string
                          user:
                            $ref: '#/components/schemas/AuthUser'
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Account not active
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/auth/verifications/email:
    post:
      tags: [Auth]
      summary: Kirim OTP verifikasi email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationRequest'
      responses:
        '200':
          description: OTP sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/auth/verifications/email/confirm:
    post:
      tags: [Auth]
      summary: Konfirmasi OTP verifikasi email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationConfirmRequest'
      responses:
        '200':
          description: Email verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: Invalid or expired OTP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/auth/oauth/google:
    post:
      tags: [Auth]
      summary: Login/register menggunakan Google token (BE verification)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoogleOauthRequest'
      responses:
        '200':
          description: OAuth login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          description: Invalid Google token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '501':
          description: OAuth provider not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Ambil profil user saat ini
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AuthUser'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/patients:
    get:
      tags: [Patients]
      summary: List patients (Phase 2 target)
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/Order'
      responses:
        '200':
          description: List patients
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/PatientProfile'
                          pagination:
                            $ref: '#/components/schemas/Pagination'

  /api/v1/patients/{patientId}/profile:
    get:
      tags: [Patients]
      summary: Detail patient profile (Phase 2 target)
      security:
        - BearerAuth: []
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Patient profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PatientProfile'
    put:
      tags: [Patients]
      summary: Update patient profile (Phase 2 target)
      description: >
        Untuk onboarding patient, FE bisa tetap memakai satu flow UI. Setelah register/login
        berhasil, kirim biodata ke endpoint ini sebagai proses kedua. Payload memakai field
        English yang canonical: `dateOfBirth`, `sex`, `heightCm`, `bloodType`, dan `address`.
      security:
        - BearerAuth: []
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatientProfileUpdateRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PatientProfile'

  /api/v1/doctors/{doctorId}/profile:
    get:
      tags: [Doctors]
      summary: Detail doctor profile (Phase 2 target)
      security:
        - BearerAuth: []
      parameters:
        - name: doctorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Doctor profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DoctorProfile'
    put:
      tags: [Doctors]
      summary: Update doctor profile (Phase 2 target)
      security:
        - BearerAuth: []
      parameters:
        - name: doctorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DoctorProfileUpdateRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'

  /api/v1/doctors/{doctorId}/patients:
    get:
      tags: [DoctorPatients]
      summary: List relasi pasien milik dokter
      security:
        - BearerAuth: []
      parameters:
        - name: doctorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Doctor-patient list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/DoctorPatientLink'
                          pagination:
                            $ref: '#/components/schemas/Pagination'
    post:
      tags: [DoctorPatients]
      summary: Link dokter ke pasien
      security:
        - BearerAuth: []
      parameters:
        - name: doctorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DoctorPatientLinkRequest'
      responses:
        '201':
          description: Linked
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DoctorPatientLink'

  /api/v1/doctors/{doctorId}/patients/{patientId}:
    delete:
      tags: [DoctorPatients]
      summary: Nonaktifkan relasi dokter-pasien
      security:
        - BearerAuth: []
      parameters:
        - name: doctorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: patientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Unlinked
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DoctorPatientLink'

  /api/v1/doctors/{doctorId}/patients/link-by-patient-id:
    post:
      tags: [DoctorPatients]
      summary: Link dokter ke pasien dari hasil scan QR frontend (payload patientId)
      description: |
        QR code digenerate di frontend dari string patientId.
        Backend menerima hasil scan dalam bentuk patientId dan membuat relasi dokter-pasien.
      security:
        - BearerAuth: []
      parameters:
        - name: doctorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DoctorLinkByPatientIdRequest'
      responses:
        '201':
          description: Linked by scanned patient ID
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DoctorPatientLink'

  /api/v1/doctors/{doctorId}/dashboard/pairing-sessions:
    post:
      tags: [DoctorDashboard]
      summary: Buat session QR pairing untuk dashboard desktop dokter
      description: |
        Endpoint ini dipanggil web dashboard dokter untuk membuat QR pairing jangka pendek.
        Mobile pasien akan scan QR lalu konfirmasi ke endpoint pairing confirm.
      security:
        - BearerAuth: []
      parameters:
        - name: doctorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DashboardPairingSessionCreateRequest'
      responses:
        '201':
          description: Pairing session created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DashboardPairingSessionCreateData'

  /api/v1/doctors/{doctorId}/dashboard/pairing-sessions/{pairingSessionId}:
    get:
      tags: [DoctorDashboard]
      summary: Ambil status session QR pairing dashboard desktop
      security:
        - BearerAuth: []
      parameters:
        - name: doctorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: pairingSessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Pairing session status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DashboardPairingSession'
        '404':
          description: Pairing session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/doctors/{doctorId}/dashboard/pairing-sessions/{pairingSessionId}/events:
    get:
      tags: [DoctorDashboard]
      summary: Stream realtime status pairing dashboard via SSE
      description: |
        Endpoint SSE (Server-Sent Events) untuk menerima perubahan status pairing secara realtime.
        Event utama:
        - `pairing-status` berisi payload status terbaru
        - `ping` heartbeat agar koneksi tetap aktif
      security:
        - BearerAuth: []
      parameters:
        - name: doctorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: pairingSessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: SSE stream pairing status
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  event: pairing-status
                  data: {"pairingSessionId":"92d6f1bf-45ef-470f-a5a3-2f277f3138ca","doctorId":"8aca6089-3899-4b85-a715-0a63113e846a","status":"pending","expiresAt":"2026-04-09T12:10:00.000Z","confirmedAt":null,"patientId":null}
        '404':
          description: Pairing session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

