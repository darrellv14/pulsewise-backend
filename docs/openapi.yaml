  /api/v1/doctors/{doctorId}/patients/link-by-patient-id:
    post:
      tags: [DoctorPatients]
      summary: Link dokter ke pasien dari hasil scan QR frontend (payload patientId)
      description: |
        QR code digenerate di frontend dari string patientId.
        Backend menerima hasil scan dalam bentuk patientId dan membuat relasi dokter-pasien.
      security:
        - BearerAuth: []
      parameters:
        - name: doctorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DoctorLinkByPatientIdRequest'
      responses:
        '201':
          description: Linked by scanned patient ID
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DoctorPatientLink'

  /api/v1/doctors/{doctorId}/dashboard/pairing-sessions:
    post:
      tags: [DoctorDashboard]
      summary: Buat session QR pairing untuk dashboard desktop dokter
      description: |
        Endpoint ini dipanggil web dashboard dokter untuk membuat QR pairing jangka pendek.
        Mobile pasien akan scan QR lalu konfirmasi ke endpoint pairing confirm.
      security:
        - BearerAuth: []
      parameters:
        - name: doctorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DashboardPairingSessionCreateRequest'
      responses:
        '201':
          description: Pairing session created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DashboardPairingSessionCreateData'

  /api/v1/doctors/{doctorId}/dashboard/pairing-sessions/{pairingSessionId}:
    get:
      tags: [DoctorDashboard]
      summary: Ambil status session QR pairing dashboard desktop
      security:
        - BearerAuth: []
      parameters:
        - name: doctorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: pairingSessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Pairing session status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DashboardPairingSession'
        '404':
          description: Pairing session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/doctors/{doctorId}/dashboard/pairing-sessions/{pairingSessionId}/events:
    get:
      tags: [DoctorDashboard]
      summary: Stream realtime status pairing dashboard via SSE
      description: |
        Endpoint SSE (Server-Sent Events) untuk menerima perubahan status pairing secara realtime.
        Event utama:
        - `pairing-status` berisi payload status terbaru
        - `ping` heartbeat agar koneksi tetap aktif
      security:
        - BearerAuth: []
      parameters:
        - name: doctorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: pairingSessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: SSE stream pairing status
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  event: pairing-status
                  data: {"pairingSessionId":"92d6f1bf-45ef-470f-a5a3-2f277f3138ca","doctorId":"8aca6089-3899-4b85-a715-0a63113e846a","status":"pending","expiresAt":"2026-04-09T12:10:00.000Z","confirmedAt":null,"patientId":null}
        '404':
          description: Pairing session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/dashboard/pairing-sessions/confirm:
    post:
      tags: [DoctorDashboard]
      summary: Konfirmasi pairing dashboard dari hasil scan QR di mobile pasien
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DashboardPairingSessionConfirmRequest'
      responses:
        '200':
          description: Pairing already finalized (idempotent)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DashboardPairingSessionConfirmData'
        '201':
          description: Pairing newly confirmed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DashboardPairingSessionConfirmData'
        '404':
          description: Pairing token invalid or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

