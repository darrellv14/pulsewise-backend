openapi: 3.0.3
info:
  title: PulseWise Backend API
  version: 1.0.0
  description: |
    Kontrak API utama PulseWise.
    Semua endpoint menggunakan JSON dan response envelope standar.
servers:
  - url: https://pulsewise-backend.vercel.app
    description: Production (Vercel)
  - url: http://localhost:5000
    description: Local Development

tags:
  - name: Health
  - name: Auth
  - name: Patients
  - name: Doctors
  - name: DoctorPatients
  - name: DoctorDashboard
  - name: Medications
  - name: Patient Care
  - name: Profile Management
  - name: Biometrics

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    SortBy:
      name: sortBy
      in: query
      schema:
        type: string
        example: created_at
    Order:
      name: order
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: desc

  schemas:
    SuccessEnvelope:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Operation success
        data:
          type: object
          nullable: true

    ErrorEnvelope:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Validation failed
        details:
          type: object
          nullable: true
          additionalProperties: true

    Pagination:
      type: object
      required: [page, limit, totalItems, totalPages]
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        totalItems:
          type: integer
          example: 125
        totalPages:
          type: integer
          example: 7

    AuthUser:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        role:
          type: string
          enum: [patient, doctor, admin]
        accountStatus:
          type: string
          enum: [pending_verification, active, suspended]
        emailVerifiedAt:
          type: string
          format: date-time
          nullable: true

    RegisterRequest:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          minLength: 3
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          enum: [patient, doctor, admin]
          default: patient

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    EmailVerificationRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    EmailVerificationConfirmRequest:
      type: object
      required: [email, otp]
      properties:
        email:
          type: string
          format: email
        otp:
          type: string
          example: '123456'

    GoogleOauthRequest:
      type: object
      required: [idToken]
      properties:
        idToken:
          type: string
        role:
          type: string
          enum: [patient, doctor]
          default: patient

    PatientProfile:
      type: object
      properties:
        patient_id:
          type: string
          format: uuid
        date_of_birth:
          type: string
          format: date
          nullable: true
        sex:
          type: string
          nullable: true
        body_height_cm:
          type: number
          nullable: true
          example: 172.5
        is_smoking:
          type: boolean
          nullable: true
          example: false
        is_electric_smoking:
          type: boolean
          nullable: true
          example: false
        blood_type:
          type: string
          nullable: true
          enum: [A, A+, A-, B, B+, B-, AB, AB+, AB-, O, O+, O-]
        address:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true

    DoctorProfile:
      type: object
      properties:
        doctor_id:
          type: string
          format: uuid
        specialization:
          type: string
          nullable: true
        license_no:
          type: string
          nullable: true
        hospital_name:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true

    PatientProfileUpdateRequest:
      type: object
      minProperties: 1
      description: >
        Dipakai sebagai proses kedua setelah register/login berhasil pada flow onboarding patient.
        Gunakan field English yang canonical agar kontrak FE dan BE tetap sederhana.
      properties:
        dateOfBirth:
          type: string
          format: date
          nullable: true
        heightCm:
          type: number
          minimum: 30
          maximum: 300
          nullable: true
        isSmoking:
          type: boolean
          nullable: true
        isElectricSmoking:
          type: boolean
          nullable: true
        bloodType:
          type: string
          nullable: true
          enum: [A, A+, A-, B, B+, B-, AB, AB+, AB-, O, O+, O-]
        sex:
          type: string
          nullable: true
          example: male
        address:
          type: string
          nullable: true
          example: Jalan Sukamaju No. 88, Surabaya

    Medication:
      type: object
      properties:
        medicationId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        conditionTag:
          type: string
          nullable: true
        form:
          type: string
          nullable: true
        color:
          type: string
          nullable: true
        singleDose:
          type: number
          nullable: true
        singleDoseUnit:
          type: string
          nullable: true
        startDate:
          type: string
          format: date
          nullable: true
        frequency:
          type: string
          enum: [daily, weekly]
        numOfDays:
          type: integer
          nullable: true
        daysOfWeek:
          type: array
          items:
            type: integer
            minimum: 1
            maximum: 7
        intakeTimes:
          type: array
          items:
            type: string
            pattern: '^([01]\\d|2[0-3]):([0-5]\\d)$'
        note:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        reminders:
          type: array
          items:
            $ref: '#/components/schemas/Reminder'

    Reminder:
      type: object
      properties:
        reminderId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        medicationId:
          type: string
          format: uuid
        scheduleTime:
          type: string
          example: '08:00'
        dayOfWeek:
          type: integer
          nullable: true
          minimum: 1
          maximum: 7
        createdAt:
          type: string
          format: date-time

    ReminderInput:
      type: object
      required: [scheduleTime]
      properties:
        scheduleTime:
          type: string
          pattern: '^([01]\\d|2[0-3]):([0-5]\\d)$'
          example: '08:00'
        dayOfWeek:
          type: integer
          nullable: true
          minimum: 1
          maximum: 7

    MedicationLog:
      type: object
      properties:
        medicationLogId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        medicationId:
          type: string
          format: uuid
        medicationDate:
          type: string
          format: date
        medicationTime:
          type: string
          nullable: true
          example: '08:15'
        createdAt:
          type: string
          format: date-time

    MedicationLogCreateRequest:
      type: object
      required: [medicationDate]
      properties:
        medicationDate:
          type: string
          format: date
          example: '2026-04-10'
        medicationTime:
          type: string
          nullable: true
          pattern: '^([01]\\d|2[0-3]):([0-5]\\d)$'
          example: '08:15'

    EmergencyContact:
      type: object
      properties:
        emergencyContactId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        contactLabel:
          type: string
        contactNumber:
          type: string
        isPriority:
          type: boolean
        createdAt:
          type: string
          format: date-time

    EmergencyContactCreateRequest:
      type: object
      required: [contactLabel, contactNumber]
      properties:
        contactLabel:
          type: string
          minLength: 1
          maxLength: 100
        contactNumber:
          type: string
          minLength: 3
          maxLength: 50
        isPriority:
          type: boolean
          default: false

    EmergencyContactUpdateRequest:
      type: object
      minProperties: 1
      properties:
        contactLabel:
          type: string
          nullable: true
          maxLength: 100
        contactNumber:
          type: string
          nullable: true
          maxLength: 50
        isPriority:
          type: boolean

    HeartDiary:
      type: object
      properties:
        diaryId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        diaryDate:
          type: string
          format: date
        createdAt:
          type: string
          format: date-time

    DailyBodyMetric:
      type: object
      properties:
        metricId:
          type: string
          format: uuid
        diaryId:
          type: string
          format: uuid
        conditionTag:
          type: string
          nullable: true
        bodyHeight:
          type: number
          nullable: true
        bodyWeight:
          type: number
          nullable: true
        bmi:
          type: number
          nullable: true
        systolicPressure:
          type: integer
          nullable: true
        diastolicPressure:
          type: integer
          nullable: true
        timeStamp:
          type: string
          format: date-time
          nullable: true

    DailySymptom:
      type: object
      properties:
        symptomId:
          type: string
          format: uuid
        diaryId:
          type: string
          format: uuid
        symptomName:
          type: string
        intensity:
          type: integer
          nullable: true
        note:
          type: string
          nullable: true
        time:
          type: string
          nullable: true
          example: '07:30'
        timeStamp:
          type: string
          format: date-time
          nullable: true

    DailyActivity:
      type: object
      properties:
        activityId:
          type: string
          format: uuid
        diaryId:
          type: string
          format: uuid
        name:
          type: string
        duration:
          type: integer
          nullable: true
        heartRate:
          type: integer
          nullable: true
        userFeeling:
          type: string
          nullable: true
        note:
          type: string
          nullable: true
        timeStamp:
          type: string
          format: date-time
          nullable: true

    DailyConsumption:
      type: object
      properties:
        consumptionId:
          type: string
          format: uuid
        diaryId:
          type: string
          format: uuid
        type:
          type: string
          nullable: true
        name:
          type: string
          nullable: true
        portion:
          type: string
          nullable: true
        note:
          type: string
          nullable: true
        time:
          type: string
          nullable: true
          example: '21:15'
        timeStamp:
          type: string
          format: date-time
          nullable: true

    HeartDiaryCreateRequest:
      type: object
      required: [diaryDate]
      properties:
        diaryDate:
          type: string
          format: date
          example: '2026-04-10'

    DailyBodyMetricCreateByDateRequest:
      allOf:
        - $ref: '#/components/schemas/DailyBodyMetricCreateRequest'
        - type: object
          required: [diaryDate]
          description: >
            Upsert body metric harian. Jika diary pada tanggal tersebut sudah punya body metric,
            field yang dikirim akan memperbarui record terakhir dan field yang tidak dikirim akan
            dipertahankan.
          properties:
            diaryDate:
              type: string
              format: date
              example: '2026-04-10'

    DailyBodyMetricCreateRequest:
      type: object
      minProperties: 1
      properties:
        conditionTag:
          type: string
          nullable: true
          maxLength: 64
        bodyHeight:
          type: number
          minimum: 30
          maximum: 300
          nullable: true
        bodyWeight:
          type: number
          minimum: 1
          maximum: 500
          nullable: true
        bmi:
          type: number
          minimum: 1
          maximum: 100
          nullable: true
        systolicPressure:
          type: integer
          minimum: 50
          maximum: 300
          nullable: true
        diastolicPressure:
          type: integer
          minimum: 30
          maximum: 250
          nullable: true
        timeStamp:
          type: string
          format: date-time

    DailySymptomCreateRequest:
      type: object
      required: [symptomName]
      properties:
        symptomName:
          type: string
          minLength: 1
          maxLength: 120
        intensity:
          type: integer
          minimum: 1
          maximum: 10
          nullable: true
        note:
          type: string
          nullable: true
          maxLength: 2000
        timeStamp:
          type: string
          format: date-time

    DailySymptomCreateByDateRequest:
      allOf:
        - $ref: '#/components/schemas/DailySymptomCreateRequest'
        - type: object
          required: [diaryDate]
          properties:
            diaryDate:
              type: string
              format: date
              example: '2026-04-10'
            time:
              type: string
              pattern: ^([01]\d|2[0-3]):([0-5]\d)$
              example: '07:30'

    DailyActivityCreateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        duration:
          type: integer
          minimum: 1
          maximum: 1440
          nullable: true
        heartRate:
          type: integer
          minimum: 20
          maximum: 250
          nullable: true
        userFeeling:
          type: string
          nullable: true
          maxLength: 80
        note:
          type: string
          nullable: true
          maxLength: 2000
        timeStamp:
          type: string
          format: date-time

    DailyActivityCreateByDateRequest:
      allOf:
        - $ref: '#/components/schemas/DailyActivityCreateRequest'
        - type: object
          required: [diaryDate]
          properties:
            diaryDate:
              type: string
              format: date
              example: '2026-04-10'

    DailyConsumptionCreateRequest:
      type: object
      properties:
        type:
          type: string
          nullable: true
          maxLength: 50
        name:
          type: string
          nullable: true
          maxLength: 120
        portion:
          type: string
          nullable: true
          maxLength: 80
        note:
          type: string
          nullable: true
          maxLength: 2000
        timeStamp:
          type: string
          format: date-time

    DailyConsumptionCreateByDateRequest:
      allOf:
        - $ref: '#/components/schemas/DailyConsumptionCreateRequest'
        - type: object
          required: [diaryDate]
          properties:
            diaryDate:
              type: string
              format: date
              example: '2026-04-10'
            time:
              type: string
              pattern: ^([01]\d|2[0-3]):([0-5]\d)$
              example: '21:15'

    HeartDiaryDetail:
      allOf:
        - $ref: '#/components/schemas/HeartDiary'
        - type: object
          properties:
            bodyMetrics:
              type: array
              items:
                $ref: '#/components/schemas/DailyBodyMetric'
            symptoms:
              type: array
              items:
                $ref: '#/components/schemas/DailySymptom'
            activities:
              type: array
              items:
                $ref: '#/components/schemas/DailyActivity'
            consumptions:
              type: array
              items:
                $ref: '#/components/schemas/DailyConsumption'

    AvatarUploadSignatureResponse:
      type: object
      properties:
        cloudName:
          type: string
        apiKey:
          type: string
        timestamp:
          type: integer
        folder:
          type: string
        signature:
          type: string
        transformation:
          type: string
        allowed_formats:
          type: string
        uploadUrl:
          type: string
          format: uri

    AvatarSaveRequest:
      type: object
      required: [secureUrl]
      properties:
        secureUrl:
          type: string
          format: uri
          maxLength: 2000
        publicId:
          type: string
          nullable: true
          maxLength: 300
        bytes:
          type: integer
          minimum: 1
        width:
          type: integer
          minimum: 1
        height:
          type: integer
          minimum: 1
        format:
          type: string
        resourceType:
          type: string
          enum: [image]

    AvatarSaveResponse:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        avatarPhoto:
          type: string
          format: uri
        cloudinaryPublicId:
          type: string
          nullable: true
        updatedAt:
          type: string
          format: date-time

    MedicationCreateRequest:
      type: object
      required: [name, startDate, frequency, intakeTimes]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        description:
          type: string
          nullable: true
        conditionTag:
          type: string
          nullable: true
        form:
          type: string
          nullable: true
          maxLength: 50
        color:
          type: string
          nullable: true
          maxLength: 50
        singleDose:
          type: number
          nullable: true
        singleDoseUnit:
          type: string
          nullable: true
          maxLength: 32
        startDate:
          type: string
          format: date
        frequency:
          type: string
          enum: [daily, weekly]
        numOfDays:
          type: integer
          nullable: true
          minimum: 1
          maximum: 10
        daysOfWeek:
          type: array
          items:
            type: integer
            minimum: 1
            maximum: 7
        intakeTimes:
          type: array
          minItems: 1
          maxItems: 24
          items:
            type: string
            pattern: '^([01]\\d|2[0-3]):([0-5]\\d)$'
        note:
          type: string
          nullable: true

    MedicationUpdateRequest:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        description:
          type: string
          nullable: true
        conditionTag:
          type: string
          nullable: true
        form:
          type: string
          nullable: true
          maxLength: 50
        color:
          type: string
          nullable: true
          maxLength: 50
        singleDose:
          type: number
          nullable: true
        singleDoseUnit:
          type: string
          nullable: true
          maxLength: 32
        startDate:
          type: string
          format: date
        frequency:
          type: string
          enum: [daily, weekly]
        numOfDays:
          type: integer
          nullable: true
          minimum: 1
          maximum: 10
        daysOfWeek:
          type: array
          items:
            type: integer
            minimum: 1
            maximum: 7
        intakeTimes:
          type: array
          minItems: 1
          maxItems: 24
          items:
            type: string
            pattern: '^([01]\\d|2[0-3]):([0-5]\\d)$'
        note:
          type: string
          nullable: true

    DoctorProfileUpdateRequest:
      type: object
      minProperties: 1
      properties:
        specialization:
          type: string
          nullable: true
          example: Cardiology
        licenseNo:
          type: string
          nullable: true
          example: DOC-123456
        hospitalName:
          type: string
          nullable: true
          example: RS PulseWise

    DoctorPatientLinkRequest:
      type: object
      required: [patientId]
      properties:
        patientId:
          type: string
          format: uuid
        source:
          type: string
          example: manual

    DoctorPatientLink:
      type: object
      properties:
        doctor_id:
          type: string
          format: uuid
        patient_id:
          type: string
          format: uuid
        source:
          type: string
        linked_at:
          type: string
          format: date-time
        is_active:
          type: boolean
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true

    PatientShareCreateRequest:
      type: object
      properties:
        expiresInHours:
          type: integer
          minimum: 1
          maximum: 168
          default: 24

    DoctorLinkByShareRequest:
      type: object
      required: [shareCode]
      properties:
        shareCode:
          type: string
          example: PW-9A8B7C6D5E4F

    DoctorLinkByPatientIdRequest:
      type: object
      required: [patientId]
      properties:
        patientId:
          type: string
          format: uuid
        source:
          type: string
          example: qr_patient_id

    DashboardPairingSessionCreateRequest:
      type: object
      properties:
        expiresInSeconds:
          type: integer
          minimum: 30
          maximum: 300
          default: 90

    DashboardPairingSessionConfirmRequest:
      type: object
      required: [pairingToken]
      properties:
        pairingToken:
          type: string
          example: PWDASH-79F438BA5A36D22D7A4EA247FEC9E928A9CC
        source:
          type: string
          example: qr_dashboard_pairing

    DashboardPairingSession:
      type: object
      properties:
        pairingSessionId:
          type: string
          format: uuid
        doctorId:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, confirmed, expired, cancelled]
        expiresAt:
          type: string
          format: date-time
        confirmedAt:
          type: string
          format: date-time
          nullable: true
        patientId:
          type: string
          format: uuid
          nullable: true

    DashboardPairingSessionCreateData:
      allOf:
        - $ref: '#/components/schemas/DashboardPairingSession'
        - type: object
          properties:
            pairingToken:
              type: string
            qrPayload:
              type: string
            pollingPath:
              type: string

    DashboardPairingSessionConfirmData:
      allOf:
        - $ref: '#/components/schemas/DashboardPairingSession'
        - type: object
          properties:
            doctorPatientLink:
              $ref: '#/components/schemas/DoctorPatientLink'
              nullable: true

    PatientShare:
      type: object
      properties:
        shareId:
          type: string
          format: uuid
        patientId:
          type: string
          format: uuid
        shareCode:
          type: string
        expiresAt:
          type: string
          format: date-time
        qrPayload:
          type: string

    DashboardPatientIdentity:
      type: object
      properties:
        patientId:
          type: string
          format: uuid
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        phone:
          type: string
          nullable: true
        dateOfBirth:
          type: string
          format: date
          nullable: true
        age:
          type: integer
          nullable: true
        sex:
          type: string
          nullable: true

    LatestVitals:
      type: object
      properties:
        measuredAt:
          type: string
          format: date-time
          nullable: true
        systolicBp:
          type: number
          nullable: true
        diastolicBp:
          type: number
          nullable: true
        heartRate:
          type: number
          nullable: true
        oxygenSaturation:
          type: number
          nullable: true
        weight:
          type: number
          nullable: true
        height:
          type: number
          nullable: true
        bmi:
          type: number
          nullable: true

    DashboardPatientListItem:
      type: object
      properties:
        patientId:
          type: string
          format: uuid
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        dateOfBirth:
          type: string
          format: date
          nullable: true
        sex:
          type: string
          nullable: true
        latestVitals:
          $ref: '#/components/schemas/LatestVitals'

    DashboardPeriod:
      type: object
      properties:
        startAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time
        timePeriod:
          type: string

    DashboardVitalsSeries:
      type: object
      properties:
        timestamps:
          type: array
          items:
            type: string
            format: date-time
        systolicBp:
          type: array
          items:
            type: number
            nullable: true
        diastolicBp:
          type: array
          items:
            type: number
            nullable: true
        heartRate:
          type: array
          items:
            type: number
            nullable: true
        oxygenSaturation:
          type: array
          items:
            type: number
            nullable: true
        weight:
          type: array
          items:
            type: number
            nullable: true
        height:
          type: array
          items:
            type: number
            nullable: true
        bmi:
          type: array
          items:
            type: number
            nullable: true

    DashboardThresholds:
      type: object
      properties:
        SPO2_CRITICAL_THRESHOLD:
          type: number
        SPO2_CAUTION_THRESHOLD:
          type: number
        WEIGHT_DAILY_INCREASE_CRITICAL_KG:
          type: number
        HR_NORMAL_MIN:
          type: number
        HR_NORMAL_MAX:
          type: number
        BP_NORMAL_SYSTOLIC_MAX:
          type: number
        BP_NORMAL_DIASTOLIC_MAX:
          type: number
        BP_ELEVATED_SYSTOLIC_MIN:
          type: number
        BP_ELEVATED_SYSTOLIC_MAX:
          type: number
        BP_ELEVATED_DIASTOLIC_MAX:
          type: number
        BP_STAGE1_SYSTOLIC_MIN:
          type: number
        BP_STAGE1_SYSTOLIC_MAX:
          type: number
        BP_STAGE1_DIASTOLIC_MIN:
          type: number
        BP_STAGE1_DIASTOLIC_MAX:
          type: number
        BP_STAGE2_SYSTOLIC_MIN:
          type: number
        BP_STAGE2_DIASTOLIC_MIN:
          type: number

    DashboardMetricStats:
      type: object
      properties:
        avg:
          type: number
          nullable: true
        min:
          type: number
          nullable: true
        max:
          type: number
          nullable: true

    DashboardAbnormalInstance:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        details:
          type: object
          additionalProperties:
            type: string

    DoctorDashboardPatientsData:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DashboardPatientListItem'
        pagination:
          $ref: '#/components/schemas/Pagination'

    DoctorDashboardPatientSummaryData:
      type: object
      properties:
        patient:
          $ref: '#/components/schemas/DashboardPatientIdentity'
        latestVitals:
          $ref: '#/components/schemas/LatestVitals'
        thresholds:
          $ref: '#/components/schemas/DashboardThresholds'

    DoctorDashboardPatientVitalsData:
      type: object
      properties:
        patient:
          $ref: '#/components/schemas/DashboardPatientIdentity'
        period:
          $ref: '#/components/schemas/DashboardPeriod'
        series:
          $ref: '#/components/schemas/DashboardVitalsSeries'
        latestVitals:
          $ref: '#/components/schemas/LatestVitals'
        thresholds:
          $ref: '#/components/schemas/DashboardThresholds'

    DoctorDashboardAbnormalReportData:
      type: object
      properties:
        patient:
          $ref: '#/components/schemas/DashboardPatientIdentity'
        period:
          $ref: '#/components/schemas/DashboardPeriod'
        stats:
          type: object
          properties:
            systolicBp:
              $ref: '#/components/schemas/DashboardMetricStats'
            diastolicBp:
              $ref: '#/components/schemas/DashboardMetricStats'
            heartRate:
              $ref: '#/components/schemas/DashboardMetricStats'
            oxygenSaturation:
              $ref: '#/components/schemas/DashboardMetricStats'
            weight:
              $ref: '#/components/schemas/DashboardMetricStats'
            bmi:
              $ref: '#/components/schemas/DashboardMetricStats'
        abnormalInstances:
          type: array
          items:
            $ref: '#/components/schemas/DashboardAbnormalInstance'
        thresholds:
          $ref: '#/components/schemas/DashboardThresholds'

    BiometricsReadingInput:
      type: object
      required: [metricType, measuredAt]
      properties:
        metricType:
          type: string
          example: systolic_bp
        valueNumeric:
          type: number
          nullable: true
          example: 128
        unit:
          type: string
          nullable: true
          example: mmHg
        measuredAt:
          type: string
          format: date-time
        payload:
          type: object
          nullable: true
          additionalProperties: true

    BiometricsIngestRequest:
      type: object
      required: [source, readings]
      properties:
        patientId:
          type: string
          format: uuid
          nullable: true
          description: Wajib jika actor bukan pasien
        source:
          type: string
          example: health_connect
        readings:
          type: array
          minItems: 1
          maxItems: 500
          items:
            $ref: '#/components/schemas/BiometricsReadingInput'

    BiometricsIngestItem:
      type: object
      properties:
        readingId:
          type: integer
        metricType:
          type: string
        measuredAt:
          type: string
          format: date-time
        valueNumeric:
          type: number
          nullable: true
        unit:
          type: string
          nullable: true
        duplicate:
          type: boolean

    BiometricsIngestData:
      type: object
      properties:
        patientId:
          type: string
          format: uuid
        source:
          type: string
        totalReceived:
          type: integer
        insertedCount:
          type: integer
        duplicateCount:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/BiometricsIngestItem'

    BiometricsHistoryFilters:
      type: object
      properties:
        source:
          type: string
          nullable: true
        metricType:
          type: string
          nullable: true
        startAt:
          type: string
          format: date-time
          nullable: true
        endAt:
          type: string
          format: date-time
          nullable: true

    BiometricsHistoryItem:
      type: object
      properties:
        readingId:
          type: integer
        source:
          type: string
        metricType:
          type: string
        valueNumeric:
          type: number
          nullable: true
        unit:
          type: string
          nullable: true
        payload:
          type: object
          nullable: true
          additionalProperties: true
        measuredAt:
          type: string
          format: date-time
        receivedAt:
          type: string
          format: date-time

    BiometricsHistoryData:
      type: object
      properties:
        patientId:
          type: string
          format: uuid
        filters:
          $ref: '#/components/schemas/BiometricsHistoryFilters'
        items:
          type: array
          items:
            $ref: '#/components/schemas/BiometricsHistoryItem'
        pagination:
          $ref: '#/components/schemas/Pagination'

paths:
  /api/v1/health:
    get:
      tags: [Health]
      summary: Health check service + DB
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          timestamp:
                            type: string
                            format: date-time
                          dbTime:
                            type: string
                            format: date-time

  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register user baru (status pending_verification)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Register success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: '#/components/schemas/AuthUser'
                          nextStep:
                            type: string
                            example: EMAIL_VERIFICATION_REQUIRED
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Duplicate username/email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login dengan email dan password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          token:
                            type: string
                          user:
                            $ref: '#/components/schemas/AuthUser'
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Account not active
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/auth/verifications/email:
    post:
      tags: [Auth]
      summary: Kirim OTP verifikasi email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationRequest'
      responses:
        '200':
          description: OTP sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/auth/verifications/email/confirm:
    post:
      tags: [Auth]
      summary: Konfirmasi OTP verifikasi email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationConfirmRequest'
      responses:
        '200':
          description: Email verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: Invalid or expired OTP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/auth/oauth/google:
    post:
      tags: [Auth]
      summary: Login/register menggunakan Google token (BE verification)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoogleOauthRequest'
      responses:
        '200':
          description: OAuth login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          description: Invalid Google token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '501':
          description: OAuth provider not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Ambil profil user saat ini
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AuthUser'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/patients:
    get:
      tags: [Patients]
      summary: List patients (Phase 2 target)
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/Order'
      responses:
        '200':
          description: List patients
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/PatientProfile'
                          pagination:
                            $ref: '#/components/schemas/Pagination'

  /api/v1/patients/{patientId}/profile:
    get:
      tags: [Patients]
      summary: Detail patient profile (Phase 2 target)
      security:
        - BearerAuth: []
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Patient profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PatientProfile'
    put:
      tags: [Patients]
      summary: Update patient profile (Phase 2 target)
      description: >
        Untuk onboarding patient, FE bisa tetap memakai satu flow UI. Setelah register/login
        berhasil, kirim biodata ke endpoint ini sebagai proses kedua. Payload memakai field
        English yang canonical: `dateOfBirth`, `sex`, `heightCm`, `bloodType`, dan `address`.
      security:
        - BearerAuth: []
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatientProfileUpdateRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PatientProfile'

  /api/v1/doctors/{doctorId}/profile:
    get:
      tags: [Doctors]
      summary: Detail doctor profile (Phase 2 target)
      security:
        - BearerAuth: []
      parameters:
        - name: doctorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Doctor profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DoctorProfile'
    put:
      tags: [Doctors]
      summary: Update doctor profile (Phase 2 target)
      security:
        - BearerAuth: []
      parameters:
        - name: doctorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DoctorProfileUpdateRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'

  /api/v1/doctors/{doctorId}/patients:
    get:
      tags: [DoctorPatients]
      summary: List relasi pasien milik dokter
      security:
        - BearerAuth: []
      parameters:
        - name: doctorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Doctor-patient list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/DoctorPatientLink'
                          pagination:
                            $ref: '#/components/schemas/Pagination'
    post:
      tags: [DoctorPatients]
      summary: Link dokter ke pasien
      security:
        - BearerAuth: []
      parameters:
        - name: doctorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DoctorPatientLinkRequest'
      responses:
        '201':
          description: Linked
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DoctorPatientLink'

  /api/v1/doctors/{doctorId}/patients/{patientId}:
    delete:
      tags: [DoctorPatients]
      summary: Nonaktifkan relasi dokter-pasien
      security:
        - BearerAuth: []
      parameters:
        - name: doctorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: patientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Unlinked
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DoctorPatientLink'

  /api/v1/doctors/{doctorId}/patients/link-by-patient-id:
    post:
      tags: [DoctorPatients]
      summary: Link dokter ke pasien dari hasil scan QR frontend (payload patientId)
      description: |
        QR code digenerate di frontend dari string patientId.
        Backend menerima hasil scan dalam bentuk patientId dan membuat relasi dokter-pasien.
      security:
        - BearerAuth: []
      parameters:
        - name: doctorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DoctorLinkByPatientIdRequest'
      responses:
        '201':
          description: Linked by scanned patient ID
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DoctorPatientLink'

  /api/v1/doctors/{doctorId}/dashboard/pairing-sessions:
    post:
      tags: [DoctorDashboard]
      summary: Buat session QR pairing untuk dashboard desktop dokter
      description: |
        Endpoint ini dipanggil web dashboard dokter untuk membuat QR pairing jangka pendek.
        Mobile pasien akan scan QR lalu konfirmasi ke endpoint pairing confirm.
      security:
        - BearerAuth: []
      parameters:
        - name: doctorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DashboardPairingSessionCreateRequest'
      responses:
        '201':
          description: Pairing session created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DashboardPairingSessionCreateData'

  /api/v1/doctors/{doctorId}/dashboard/pairing-sessions/{pairingSessionId}:
    get:
      tags: [DoctorDashboard]
      summary: Ambil status session QR pairing dashboard desktop
      security:
        - BearerAuth: []
      parameters:
        - name: doctorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: pairingSessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Pairing session status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DashboardPairingSession'
        '404':
          description: Pairing session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/doctors/{doctorId}/dashboard/pairing-sessions/{pairingSessionId}/events:
    get:
      tags: [DoctorDashboard]
      summary: Stream realtime status pairing dashboard via SSE
      description: |
        Endpoint SSE (Server-Sent Events) untuk menerima perubahan status pairing secara realtime.
        Event utama:
        - `pairing-status` berisi payload status terbaru
        - `ping` heartbeat agar koneksi tetap aktif
      security:
        - BearerAuth: []
      parameters:
        - name: doctorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: pairingSessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: SSE stream pairing status
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  event: pairing-status
                  data: {"pairingSessionId":"92d6f1bf-45ef-470f-a5a3-2f277f3138ca","doctorId":"8aca6089-3899-4b85-a715-0a63113e846a","status":"pending","expiresAt":"2026-04-09T12:10:00.000Z","confirmedAt":null,"patientId":null}
        '404':
          description: Pairing session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/dashboard/pairing-sessions/confirm:
    post:
      tags: [DoctorDashboard]
      summary: Konfirmasi pairing dashboard dari hasil scan QR di mobile pasien
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DashboardPairingSessionConfirmRequest'
      responses:
        '200':
          description: Pairing already finalized (idempotent)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DashboardPairingSessionConfirmData'
        '201':
          description: Pairing newly confirmed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DashboardPairingSessionConfirmData'
        '404':
          description: Pairing token invalid or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/doctors/{doctorId}/dashboard/patients:
    get:
      tags: [DoctorDashboard]
      summary: List pasien dashboard dokter (dengan search dan latest vitals)
      security:
        - BearerAuth: []
      parameters:
        - name: doctorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - name: q
          in: query
          required: false
          schema:
            type: string
            example: agus
      responses:
        '200':
          description: Dashboard patient list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DoctorDashboardPatientsData'
        '403':
          description: Forbidden access to doctor scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/doctors/{doctorId}/dashboard/patients/{patientId}:
    get:
      tags: [DoctorDashboard]
