openapi: 3.0.3
info:
  title: PulseWise Backend API
  version: 1.0.0
  description: |
    Kontrak API utama PulseWise.
    Semua endpoint menggunakan JSON dan response envelope standar.
servers:
  - url: http://localhost:5000
    description: Local

tags:
  - name: Health
  - name: Auth
  - name: Patients
  - name: Doctors
  - name: DoctorPatients
  - name: DoctorDashboard
  - name: Biometrics

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    SortBy:
      name: sortBy
      in: query
      schema:
        type: string
        example: created_at
    Order:
      name: order
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: desc

  schemas:
    SuccessEnvelope:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Operation success
        data:
          type: object
          nullable: true

    ErrorEnvelope:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Validation failed
        details:
          type: object
          nullable: true
          additionalProperties: true

    Pagination:
      type: object
      required: [page, limit, totalItems, totalPages]
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        totalItems:
          type: integer
          example: 125
        totalPages:
          type: integer
          example: 7

    AuthUser:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        role:
          type: string
          enum: [patient, doctor, admin]
        accountStatus:
          type: string
          enum: [pending_verification, active, suspended]
        emailVerifiedAt:
          type: string
          format: date-time
          nullable: true

    RegisterRequest:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          minLength: 3
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          enum: [patient, doctor, admin]
          default: patient

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    EmailVerificationRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    EmailVerificationConfirmRequest:
      type: object
      required: [email, otp]
      properties:
        email:
          type: string
          format: email
        otp:
          type: string
          example: '123456'

    GoogleOauthRequest:
      type: object
      required: [idToken]
      properties:
        idToken:
          type: string
        role:
          type: string
          enum: [patient, doctor]
          default: patient

    PatientProfile:
      type: object
      properties:
        patient_id:
          type: string
          format: uuid
        date_of_birth:
          type: string
          format: date
          nullable: true
        sex:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true

    DoctorProfile:
      type: object
      properties:
        doctor_id:
          type: string
          format: uuid
        specialization:
          type: string
          nullable: true
        license_no:
          type: string
          nullable: true
        hospital_name:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true

    PatientProfileUpdateRequest:
      type: object
      minProperties: 1
      properties:
        dateOfBirth:
          type: string
          format: date
          nullable: true
        age:
          type: integer
          nullable: true
        sex:
          type: string
          nullable: true
          example: male

    DoctorProfileUpdateRequest:
      type: object
      minProperties: 1
      properties:
        specialization:
          type: string
          nullable: true
          example: Cardiology
        licenseNo:
          type: string
          nullable: true
          example: DOC-123456
        hospitalName:
          type: string
          nullable: true
          example: RS PulseWise

    DoctorPatientLinkRequest:
      type: object
      required: [patientId]
      properties:
        patientId:
          type: string
          format: uuid
        source:
          type: string
          example: manual

    DoctorPatientLink:
      type: object
      properties:
        doctor_id:
          type: string
          format: uuid
        patient_id:
          type: string
          format: uuid
        source:
          type: string
        linked_at:
          type: string
          format: date-time
        is_active:
          type: boolean
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true

    PatientShareCreateRequest:
      type: object
      properties:
        expiresInHours:
          type: integer
          minimum: 1
          maximum: 168
          default: 24

    DoctorLinkByShareRequest:
      type: object
      required: [shareCode]
      properties:
        shareCode:
          type: string
          example: PW-9A8B7C6D5E4F

    DoctorLinkByPatientIdRequest:
      type: object
      required: [patientId]
      properties:
        patientId:
          type: string
          format: uuid
        source:
          type: string
          example: qr_patient_id

    DashboardPairingSessionCreateRequest:
      type: object
      properties:
        expiresInSeconds:
          type: integer
          minimum: 30
          maximum: 300
          default: 90

    DashboardPairingSessionConfirmRequest:
      type: object
      required: [pairingToken]
      properties:
        pairingToken:
          type: string
          example: PWDASH-79F438BA5A36D22D7A4EA247FEC9E928A9CC
        source:
          type: string
          example: qr_dashboard_pairing

    DashboardPairingSession:
      type: object
      properties:
        pairingSessionId:
          type: string
          format: uuid
        doctorId:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, confirmed, expired, cancelled]
        expiresAt:
          type: string
          format: date-time
        confirmedAt:
          type: string
          format: date-time
          nullable: true
        patientId:
          type: string
          format: uuid
          nullable: true

    DashboardPairingSessionCreateData:
      allOf:
        - $ref: '#/components/schemas/DashboardPairingSession'
        - type: object
          properties:
            pairingToken:
              type: string
            qrPayload:
              type: string
            pollingPath:
              type: string

    DashboardPairingSessionConfirmData:
      allOf:
        - $ref: '#/components/schemas/DashboardPairingSession'
        - type: object
          properties:
            doctorPatientLink:
              $ref: '#/components/schemas/DoctorPatientLink'
              nullable: true

    PatientShare:
      type: object
      properties:
        shareId:
          type: string
          format: uuid
        patientId:
          type: string
          format: uuid
        shareCode:
          type: string
        expiresAt:
          type: string
          format: date-time
        qrPayload:
          type: string

    DashboardPatientIdentity:
      type: object
      properties:
        patientId:
          type: string
          format: uuid
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        phone:
          type: string
          nullable: true
        dateOfBirth:
          type: string
          format: date
          nullable: true
        age:
          type: integer
          nullable: true
        sex:
          type: string
          nullable: true

    LatestVitals:
      type: object
      properties:
        measuredAt:
          type: string
          format: date-time
          nullable: true
        systolicBp:
          type: number
          nullable: true
        diastolicBp:
          type: number
          nullable: true
        heartRate:
          type: number
          nullable: true
        oxygenSaturation:
          type: number
          nullable: true
        weight:
          type: number
          nullable: true
        height:
          type: number
          nullable: true
        bmi:
          type: number
          nullable: true

    DashboardPatientListItem:
      type: object
      properties:
        patientId:
          type: string
          format: uuid
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        dateOfBirth:
          type: string
          format: date
          nullable: true
        sex:
          type: string
          nullable: true
        latestVitals:
          $ref: '#/components/schemas/LatestVitals'

    DashboardPeriod:
      type: object
      properties:
        startAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time
        timePeriod:
          type: string

    DashboardVitalsSeries:
      type: object
      properties:
        timestamps:
          type: array
          items:
            type: string
            format: date-time
        systolicBp:
          type: array
          items:
            type: number
            nullable: true
        diastolicBp:
          type: array
          items:
            type: number
            nullable: true
        heartRate:
          type: array
          items:
            type: number
            nullable: true
        oxygenSaturation:
          type: array
          items:
            type: number
            nullable: true
        weight:
          type: array
          items:
            type: number
            nullable: true
        height:
          type: array
          items:
            type: number
            nullable: true
        bmi:
          type: array
          items:
            type: number
            nullable: true

    DashboardThresholds:
      type: object
      properties:
        SPO2_CRITICAL_THRESHOLD:
          type: number
        SPO2_CAUTION_THRESHOLD:
          type: number
        WEIGHT_DAILY_INCREASE_CRITICAL_KG:
          type: number
        HR_NORMAL_MIN:
          type: number
        HR_NORMAL_MAX:
          type: number
        BP_NORMAL_SYSTOLIC_MAX:
          type: number
        BP_NORMAL_DIASTOLIC_MAX:
          type: number
        BP_ELEVATED_SYSTOLIC_MIN:
          type: number
        BP_ELEVATED_SYSTOLIC_MAX:
          type: number
        BP_ELEVATED_DIASTOLIC_MAX:
          type: number
        BP_STAGE1_SYSTOLIC_MIN:
          type: number
        BP_STAGE1_SYSTOLIC_MAX:
          type: number
        BP_STAGE1_DIASTOLIC_MIN:
          type: number
        BP_STAGE1_DIASTOLIC_MAX:
          type: number
        BP_STAGE2_SYSTOLIC_MIN:
          type: number
        BP_STAGE2_DIASTOLIC_MIN:
          type: number

    DashboardMetricStats:
      type: object
      properties:
        avg:
          type: number
          nullable: true
        min:
          type: number
          nullable: true
        max:
          type: number
          nullable: true

    DashboardAbnormalInstance:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        details:
          type: object
          additionalProperties:
            type: string

    DoctorDashboardPatientsData:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DashboardPatientListItem'
        pagination:
          $ref: '#/components/schemas/Pagination'

    DoctorDashboardPatientSummaryData:
      type: object
      properties:
        patient:
          $ref: '#/components/schemas/DashboardPatientIdentity'
        latestVitals:
          $ref: '#/components/schemas/LatestVitals'
        thresholds:
          $ref: '#/components/schemas/DashboardThresholds'

    DoctorDashboardPatientVitalsData:
      type: object
      properties:
        patient:
          $ref: '#/components/schemas/DashboardPatientIdentity'
        period:
          $ref: '#/components/schemas/DashboardPeriod'
        series:
          $ref: '#/components/schemas/DashboardVitalsSeries'
        latestVitals:
          $ref: '#/components/schemas/LatestVitals'
        thresholds:
          $ref: '#/components/schemas/DashboardThresholds'

    DoctorDashboardAbnormalReportData:
      type: object
      properties:
        patient:
          $ref: '#/components/schemas/DashboardPatientIdentity'
        period:
          $ref: '#/components/schemas/DashboardPeriod'
        stats:
          type: object
          properties:
            systolicBp:
              $ref: '#/components/schemas/DashboardMetricStats'
            diastolicBp:
              $ref: '#/components/schemas/DashboardMetricStats'
            heartRate:
              $ref: '#/components/schemas/DashboardMetricStats'
            oxygenSaturation:
              $ref: '#/components/schemas/DashboardMetricStats'
            weight:
              $ref: '#/components/schemas/DashboardMetricStats'
            bmi:
              $ref: '#/components/schemas/DashboardMetricStats'
        abnormalInstances:
          type: array
          items:
            $ref: '#/components/schemas/DashboardAbnormalInstance'
        thresholds:
          $ref: '#/components/schemas/DashboardThresholds'

    BiometricsReadingInput:
      type: object
      required: [metricType, measuredAt]
      properties:
        metricType:
          type: string
          example: systolic_bp
        valueNumeric:
          type: number
          nullable: true
          example: 128
        unit:
          type: string
          nullable: true
          example: mmHg
        measuredAt:
          type: string
          format: date-time
        payload:
          type: object
          nullable: true
          additionalProperties: true

    BiometricsIngestRequest:
      type: object
      required: [source, readings]
      properties:
        patientId:
          type: string
          format: uuid
          nullable: true
          description: Wajib jika actor bukan pasien
        source:
          type: string
          example: health_connect
        readings:
          type: array
          minItems: 1
          maxItems: 500
          items:
            $ref: '#/components/schemas/BiometricsReadingInput'

    BiometricsIngestItem:
      type: object
      properties:
        readingId:
          type: integer
        metricType:
          type: string
        measuredAt:
          type: string
          format: date-time
        valueNumeric:
          type: number
          nullable: true
        unit:
          type: string
          nullable: true
        duplicate:
          type: boolean

    BiometricsIngestData:
      type: object
      properties:
        patientId:
          type: string
          format: uuid
        source:
          type: string
        totalReceived:
          type: integer
        insertedCount:
          type: integer
        duplicateCount:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/BiometricsIngestItem'

    BiometricsHistoryFilters:
      type: object
      properties:
        source:
          type: string
          nullable: true
        metricType:
          type: string
          nullable: true
        startAt:
          type: string
          format: date-time
          nullable: true
        endAt:
          type: string
          format: date-time
          nullable: true

    BiometricsHistoryItem:
      type: object
      properties:
        readingId:
          type: integer
        source:
          type: string
        metricType:
          type: string
        valueNumeric:
          type: number
          nullable: true
        unit:
          type: string
          nullable: true
        payload:
          type: object
          nullable: true
          additionalProperties: true
        measuredAt:
          type: string
          format: date-time
        receivedAt:
          type: string
          format: date-time

    BiometricsHistoryData:
      type: object
      properties:
        patientId:
          type: string
          format: uuid
        filters:
          $ref: '#/components/schemas/BiometricsHistoryFilters'
        items:
          type: array
          items:
            $ref: '#/components/schemas/BiometricsHistoryItem'
        pagination:
          $ref: '#/components/schemas/Pagination'

paths:
  /api/v1/health:
    get:
      tags: [Health]
      summary: Health check service + DB
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          timestamp:
                            type: string
                            format: date-time
                          dbTime:
                            type: string
                            format: date-time

  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register user baru (status pending_verification)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Register success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: '#/components/schemas/AuthUser'
                          nextStep:
                            type: string
                            example: EMAIL_VERIFICATION_REQUIRED
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Duplicate username/email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login dengan email dan password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          token:
                            type: string
                          user:
                            $ref: '#/components/schemas/AuthUser'
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Account not active
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/auth/verifications/email:
    post:
      tags: [Auth]
      summary: Kirim OTP verifikasi email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationRequest'
      responses:
        '200':
          description: OTP sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/auth/verifications/email/confirm:
    post:
      tags: [Auth]
      summary: Konfirmasi OTP verifikasi email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationConfirmRequest'
      responses:
        '200':
          description: Email verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: Invalid or expired OTP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/auth/oauth/google:
    post:
      tags: [Auth]
      summary: Login/register menggunakan Google token (BE verification)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoogleOauthRequest'
      responses:
        '200':
          description: OAuth login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          description: Invalid Google token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '501':
          description: OAuth provider not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Ambil profil user saat ini
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AuthUser'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/patients:
    get:
      tags: [Patients]
      summary: List patients (Phase 2 target)
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/Order'
      responses:
        '200':
          description: List patients
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/PatientProfile'
                          pagination:
                            $ref: '#/components/schemas/Pagination'

  /api/v1/patients/{patientId}/profile:
    get:
      tags: [Patients]
      summary: Detail patient profile (Phase 2 target)
      security:
        - BearerAuth: []
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Patient profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PatientProfile'
    put:
      tags: [Patients]
      summary: Update patient profile (Phase 2 target)
      security:
        - BearerAuth: []
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatientProfileUpdateRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'

  /api/v1/doctors/{doctorId}/profile:
    get:
      tags: [Doctors]
      summary: Detail doctor profile (Phase 2 target)
      security:
        - BearerAuth: []
      parameters:
        - name: doctorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Doctor profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DoctorProfile'
    put:
      tags: [Doctors]
      summary: Update doctor profile (Phase 2 target)
      security:
        - BearerAuth: []
      parameters:
        - name: doctorId
          in: path
          required: true
