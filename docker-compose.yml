services:
  postgres:
    image: postgres:16-alpine
    container_name: pulsewise-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pulsewise}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pulsewise123}
      POSTGRES_DB: ${POSTGRES_DB:-pulsewise}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - pulsewise_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-pulsewise} -d ${POSTGRES_DB:-pulsewise}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pulsewise-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command:
      - sh
      - -c
      - |
        if [ -n "$REDIS_PASSWORD" ]; then
          exec redis-server --appendonly yes --requirepass "$REDIS_PASSWORD"
        else
          exec redis-server --appendonly yes
        fi
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - pulsewise_redis_data:/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'if [ -n "$REDIS_PASSWORD" ]; then redis-cli -a "$REDIS_PASSWORD" ping; else redis-cli ping; fi | grep PONG',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: pulsewise-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@pulsewise.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin123}
    ports:
      - '${PGADMIN_PORT:-5050}:80'
    depends_on:
      postgres:
        condition: service_healthy

  hfms-backend:
    build:
      context: ../hfms-backend
      dockerfile: Dockerfile
    image: pulsewise-hfms-backend:local
    container_name: pulsewise-hfms-backend
    restart: unless-stopped
    environment:
      HFMS_GA_POPULATION_SIZE: ${HFMS_GA_POPULATION_SIZE:-24}
      HFMS_GA_GENERATIONS: ${HFMS_GA_GENERATIONS:-20}
      HFMS_GA_MUTATION_PROBABILITY: ${HFMS_GA_MUTATION_PROBABILITY:-0.2}
    ports:
      - '${ML_SERVICE_PORT:-8080}:8080'

  heart-risk-ml-service:
    build:
      context: ./services/heart-risk-ml-service
      dockerfile: Dockerfile
    image: pulsewise-heart-risk-ml-service:local
    container_name: pulsewise-heart-risk-ml-service
    restart: unless-stopped
    environment:
      HEART_RISK_THRESHOLD: ${HEART_RISK_THRESHOLD:-0.43}
      HEART_RISK_ML_VERSION: ${HEART_RISK_ML_VERSION:-heart-risk-v1}
      MODEL_ARTIFACT_PATH: /app/model/model.pkl
    ports:
      - '${HEART_RISK_ML_SERVICE_PORT:-8090}:8090'

volumes:
  pulsewise_pgdata:
  pulsewise_redis_data:
